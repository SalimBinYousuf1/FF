name: 🎵 Lucid Player — Build & Release APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: 🏗️ Build APK & Release
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 📦 Bootstrap Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          echo "Downloading gradle-wrapper.jar..."
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null \
          || curl -fsSL \
            "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar 2>/dev/null \
          || (echo "Downloading via gradle distribution..." \
            && curl -fsSL "https://services.gradle.org/distributions/gradle-8.7-bin.zip" \
               -o /tmp/gradle-dist.zip \
            && unzip -jo /tmp/gradle-dist.zip "*/gradle/wrapper/gradle-wrapper.jar" \
               -d gradle/wrapper \
            && ls gradle/wrapper/)
          ls -lh gradle/wrapper/gradle-wrapper.jar && echo "✅ JAR ready"

      - name: 🔑 Make gradlew executable
        run: chmod +x gradlew

      - name: 💾 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔐 Generate signing keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "Using repository keystore"
            echo "$KEYSTORE_B64" | base64 --decode > app/lucid.keystore
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"           >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"     >> $GITHUB_ENV
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "Auto-generating keystore..."
            keytool -genkeypair \
              -alias lucid -keyalg RSA -keysize 2048 -validity 9999 \
              -storepass lucidpass -keypass lucidpass \
              -dname "CN=LucidPlayer,O=LucidPlayer,C=US" \
              -keystore app/lucid.keystore -noprompt
            echo "KEY_ALIAS=lucid"          >> $GITHUB_ENV
            echo "KEY_PASSWORD=lucidpass"   >> $GITHUB_ENV
            echo "STORE_PASSWORD=lucidpass" >> $GITHUB_ENV
            echo "✅ Auto-keystore generated"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: 🏗️ Build Release APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Xmx3g"
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/app/lucid.keystore" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            --no-daemon --stacktrace
          echo "=== APK files ==="
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: 🔨 Build Debug APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx3g"
        run: |
          ./gradlew assembleDebug --no-daemon
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

      - name: ✏️ Rename APKs
        run: |
          N=${{ github.run_number }}
          RELEASE=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          DEBUG=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          [ -n "$RELEASE" ] && cp "$RELEASE" "LucidPlayer-v1.0.${N}-release.apk"
          [ -n "$DEBUG"   ] && cp "$DEBUG"   "LucidPlayer-v1.0.${N}-debug.apk"
          ls -lh LucidPlayer-*.apk 2>/dev/null || echo "warning: no apks renamed"

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LucidPlayer-Build-${{ github.run_number }}
          path: LucidPlayer-*.apk
          retention-days: 90
          if-no-files-found: warn

      - name: 🚀 Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "🎵 Lucid Player — Build #${{ github.run_number }}"
          body: |
            ## 🎵 Lucid Player Auto-Release

            | Field | Value |
            |---|---|
            | Build | #${{ github.run_number }} |
            | Commit | `${{ github.sha }}` |
            | Branch | `${{ github.ref_name }}` |
            | By | @${{ github.actor }} |

            ---

            ## 📲 Install Instructions
            1. Download `LucidPlayer-...-release.apk` from **Assets** below ↓
            2. On your phone: **Settings → Security → Unknown Sources → ON**
            3. Open the APK file → Install → Open ✅

            ## ✨ Features
            - 🎨 AMOLED glassmorphism UI
            - 💿 Spinning vinyl animation
            - ⏱️ Sleep timer · ⚡ Speed control
            - 📋 Queue · ❤️ Favourites · 🔍 Search
            - 📱 Background playback + notifications

            > Android 8.0+ (API 26)
          files: LucidPlayer-*.apk
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📊 Build summary
        if: always()
        run: |
          echo "## 🎵 Lucid Player Build #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`$(git rev-parse --short HEAD 2>/dev/null || echo unknown)\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### APKs Built" >> $GITHUB_STEP_SUMMARY
          ls -lh LucidPlayer-*.apk 2>/dev/null | while read line; do echo "- $line"; done >> $GITHUB_STEP_SUMMARY || echo "- Build may have failed" >> $GITHUB_STEP_SUMMARY
